services:
  - type: web
    name: mystera-api
    env: python
    region: oregon
    plan: free

    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # Run migrations + seed automatically during deploy
    preDeployCommand: |
      alembic upgrade head
      python -m app.db.seed

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: DATABASE_URL
        fromDatabase:
          name: mystera-db
          property: connectionString

      - key: ANTHROPIC_API_KEY
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_ALGORITHM
        value: HS256

      - key: JWT_EXPIRE_MINUTES
        value: "10080"

      - key: ENVIRONMENT
        value: production

      - key: CORS_ORIGINS
        value: https://mystera.vercel.app

databases:
  - name: mystera-db
    databaseName: mystera
    user: detective
    plan: free
