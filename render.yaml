# render.yaml — Render.com deployment config for DetectiveOS backend
# Docs: https://render.com/docs/blueprint-spec
#
# HOW TO USE:
#   1. Push this file to your GitHub repo root
#   2. Go to https://render.com → New → Blueprint
#   3. Connect your repo — Render reads this file automatically

services:
  - type: web
    name: mystera-api
    env: python
    region: oregon
    plan: free

    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: DATABASE_URL
        fromDatabase:
          name: mystera-db
          property: connectionString

      - key: ANTHROPIC_API_KEY
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_ALGORITHM
        value: HS256

      - key: JWT_EXPIRE_MINUTES
        value: "10080"

      - key: ENVIRONMENT
        value: production

      - key: CORS_ORIGINS
        value: https://mystera.vercel.app

databases:
  - name: mystera-db
    databaseName: mystera
    user: detective
    plan: free
